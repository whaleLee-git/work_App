<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>代理任务看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient-grid"></div>
    <main class="layout">
      <header class="hero">
        <div>
          <p class="eyebrow">projectOne</p>
          <h1>代理任务看板</h1>
          <p id="last-updated">最近更新：--</p>
        </div>
        <div class="connection">
          <span id="live-dot"></span>
          <span id="live-state">连接中...</span>
        </div>
      </header>

      <section class="summary">
        <article class="summary-card">
          <p class="label">总体进度</p>
          <p class="big-number" id="overall-progress">0%</p>
          <div class="track">
            <div class="bar" id="overall-bar"></div>
          </div>
        </article>
        <article class="summary-card">
          <p class="label">活跃代理</p>
          <p class="big-number" id="active-count">0 / 0</p>
          <p class="tiny" id="blocked-count">阻塞：0</p>
        </article>
        <article class="summary-card">
          <p class="label">当前阶段</p>
          <p class="big-number" id="phase-name">--</p>
          <p class="tiny">按当前工作流里程碑推断</p>
        </article>
      </section>

      <section class="agents">
        <h2>代理状态</h2>
        <div id="agent-grid" class="agent-grid"></div>
      </section>
    </main>

    <template id="agent-card-template">
      <article class="agent-card">
        <div class="agent-head">
          <h3 class="agent-name"></h3>
          <span class="status-pill"></span>
        </div>
        <p class="task-line"></p>
        <div class="track mini">
          <div class="bar agent-bar"></div>
        </div>
        <div class="meta-row">
          <span class="progress-text"></span>
          <span class="eta-text"></span>
        </div>
        <p class="blocker-line"></p>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
